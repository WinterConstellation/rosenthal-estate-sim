name: Build Windows game

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run dist:win
      - uses: actions/upload-artifact@v7
        with:
          name: rosenthal-estate-windows
          path: release/*.exe
      - name: Publish tagged release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $asset = Get-ChildItem release -Filter *.exe | Select-Object -First 1
          gh release create "${{ github.ref_name }}" $asset.FullName --generate-notes
