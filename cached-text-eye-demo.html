<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cached Text Eye Render Test</title>
  <style>
    :root {
      color-scheme: dark;
      --panel: rgba(9, 7, 8, 0.72);
      --line: rgba(255, 72, 86, 0.2);
      --text: #f4dddd;
      --muted: #9b7e82;
      --red: #e24b5a;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 44%, rgba(98, 0, 10, 0.26), transparent 34%),
        radial-gradient(circle at 50% 52%, #130001 0%, #050001 50%, #000 100%);
      color: var(--text);
      font-family: "Malgun Gothic", "Noto Sans KR", system-ui, sans-serif;
    }

    canvas {
      position: fixed;
      inset: 0;
      display: block;
      width: 100vw;
      height: 100vh;
    }

    .panel {
      position: fixed;
      left: 18px;
      bottom: 18px;
      z-index: 5;
      width: min(430px, calc(100vw - 36px));
      border: 1px solid var(--line);
      padding: 14px;
      background: var(--panel);
      box-shadow: 0 20px 52px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(10px);
    }

    .panel h1 {
      margin: 0 0 8px;
      color: #ffe0e0;
      font-size: 13px;
      letter-spacing: 0.09em;
      text-transform: uppercase;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px 12px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .grid strong {
      color: var(--text);
      font-weight: 650;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      padding-top: 12px;
    }

    button {
      border: 1px solid rgba(255, 82, 94, 0.34);
      padding: 6px 9px;
      color: var(--text);
      background: rgba(117, 14, 26, 0.24);
      font: inherit;
      font-size: 12px;
      cursor: pointer;
    }

    button.is-on {
      border-color: rgba(255, 120, 130, 0.72);
      color: #fff4f4;
      background: rgba(169, 24, 38, 0.56);
    }

    .note {
      margin-top: 10px;
      color: #876f72;
      font-size: 11px;
      line-height: 1.5;
    }

    @media (max-width: 560px) {
      .panel {
        right: 12px;
        bottom: 12px;
        left: 12px;
        width: auto;
      }
    }
  </style>
</head>
<body>
  <canvas id="scene" aria-label="cached text eye render test"></canvas>

  <section class="panel" aria-label="render test panel">
    <h1>Cached text eye render test</h1>
    <div class="grid">
      <span>mode <strong id="modeLabel">cached sprite</strong></span>
      <span>cache <strong id="cacheLabel">--</strong></span>
      <span>build <strong id="buildLabel">-- ms</strong></span>
      <span>active <strong id="activeLabel">--</strong></span>
      <span>fps <strong id="fpsLabel">--</strong></span>
      <span>frame <strong id="frameLabel">-- ms</strong></span>
      <span>eye draw <strong id="drawLabel">-- ms</strong></span>
      <span>rain <strong id="rainLabel">--</strong></span>
    </div>
    <div class="controls">
      <button id="liveButton" type="button">live render</button>
      <button id="motionButton" class="is-on" type="button">motion</button>
      <button id="rainButton" class="is-on" type="button">text rain</button>
      <button id="blinkButton" type="button">blink now</button>
      <button id="rebuildButton" type="button">rebuild cache</button>
    </div>
    <div class="note">Default: pre-rendered eye frames are replayed with cheap drawImage calls. Live render redraws the original text eye every frame for comparison.</div>
  </section>

  <script>
    "use strict";

    const canvas = document.getElementById("scene");
    const ctx = canvas.getContext("2d", { alpha: false });
    const modeLabel = document.getElementById("modeLabel");
    const cacheLabel = document.getElementById("cacheLabel");
    const buildLabel = document.getElementById("buildLabel");
    const activeLabel = document.getElementById("activeLabel");
    const fpsLabel = document.getElementById("fpsLabel");
    const frameLabel = document.getElementById("frameLabel");
    const drawLabel = document.getElementById("drawLabel");
    const rainLabel = document.getElementById("rainLabel");
    const liveButton = document.getElementById("liveButton");
    const motionButton = document.getElementById("motionButton");
    const rainButton = document.getElementById("rainButton");
    const blinkButton = document.getElementById("blinkButton");
    const rebuildButton = document.getElementById("rebuildButton");

    const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    const seedBase = "cached-eye-test:seed-1:night:altered";
    const glyphs = [".", "-", "*", "+", "x", "X", ":", "'", "`"];
    const irisGlyphs = ["*", "+", "x", "X", "#", "%"];
    const edgeGlyphs = ["/", "\\", "|", "_", "-", "."];
    const lidGlyphs = ["-", "_", ".", "'", "`", "x", "+", ":"];

    const settings = {
      live: false,
      motion: !reduceMotion,
      rain: true,
    };

    let width = 0;
    let height = 0;
    let dpr = 1;
    let cacheDpr = 1;
    let cacheFrames = [];
    let rainGlyphs = [];
    let backgroundCuts = [];
    let frames = 0;
    let lastFpsTime = performance.now();
    let lastFrameTime = performance.now();
    let blinkStart = -10000;
    let blinkDuration = 190;
    let nextBlink = 0;
    let forcedBlink = false;

    function hashString(input) {
      let h = 2166136261;
      for (let i = 0; i < input.length; i += 1) {
        h ^= input.charCodeAt(i);
        h = Math.imul(h, 16777619);
      }
      return h >>> 0;
    }

    function hash01(...parts) {
      const base = hashString(parts.join("|"));
      let h = base + 0x6d2b79f5;
      h = Math.imul(h ^ (h >>> 15), h | 1);
      h ^= h + Math.imul(h ^ (h >>> 7), h | 61);
      return ((h ^ (h >>> 14)) >>> 0) / 4294967296;
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function pick(list, ...parts) {
      return list[Math.floor(hash01(...parts) * list.length) % list.length];
    }

    function resize() {
      dpr = Math.min(window.devicePixelRatio || 1, 1.5);
      cacheDpr = Math.min(window.devicePixelRatio || 1, 1.35);
      width = Math.max(1, Math.floor(window.innerWidth));
      height = Math.max(1, Math.floor(window.innerHeight));
      canvas.width = Math.floor(width * dpr);
      canvas.height = Math.floor(height * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.imageSmoothingEnabled = false;
      generateScene();
      rebuildCache();
    }

    function generateScene() {
      const rainCount = Math.round(clamp(width * height / 2100, 240, 620));
      rainGlyphs = Array.from({ length: rainCount }, (_, index) => ({
        x: hash01(seedBase, "rain", index, "x") * width,
        y: hash01(seedBase, "rain", index, "y") * height,
        size: 7 + hash01(seedBase, "rain", index, "size") * 8,
        speed: 12 + hash01(seedBase, "rain", index, "speed") * 58,
        sway: (hash01(seedBase, "rain", index, "sway") - 0.5) * 24,
        phase: hash01(seedBase, "rain", index, "phase") * Math.PI * 2,
        glyph: pick(glyphs, seedBase, "rain", index, "glyph"),
        alpha: 0.08 + hash01(seedBase, "rain", index, "alpha") * 0.22,
      }));
      backgroundCuts = Array.from({ length: 52 }, (_, index) => ({
        x: hash01(seedBase, "cut", index, "x") * width,
        y: hash01(seedBase, "cut", index, "y") * height,
        h: 16 + hash01(seedBase, "cut", index, "h") * 90,
        w: 1 + hash01(seedBase, "cut", index, "w") * 2,
        alpha: 0.012 + hash01(seedBase, "cut", index, "a") * 0.032,
        phase: hash01(seedBase, "cut", index, "phase") * Math.PI * 2,
      }));
      rainLabel.textContent = String(rainGlyphs.length);
    }

    function rebuildCache() {
      const started = performance.now();
      const frameWidth = Math.ceil(Math.min(width * 0.82, 780));
      const frameHeight = Math.ceil(Math.min(height * 0.46, 360));
      const openCount = 18;
      const blinkCount = 8;
      const total = openCount + blinkCount;
      const next = [];

      for (let i = 0; i < total; i += 1) {
        const isBlink = i >= openCount;
        const local = document.createElement("canvas");
        local.width = Math.ceil(frameWidth * cacheDpr);
        local.height = Math.ceil(frameHeight * cacheDpr);
        const localCtx = local.getContext("2d", { alpha: true });
        localCtx.setTransform(cacheDpr, 0, 0, cacheDpr, 0, 0);
        localCtx.clearRect(0, 0, frameWidth, frameHeight);
        localCtx.imageSmoothingEnabled = false;
        const p = isBlink ? (i - openCount) / Math.max(1, blinkCount - 1) : 0;
        const blink = isBlink ? Math.sin(p * Math.PI) : 0;
        const time = i * 113;
        drawDetailedEye(localCtx, {
          width: frameWidth,
          height: frameHeight,
          cx: frameWidth * 0.5,
          cy: frameHeight * 0.52,
          rx: Math.min(frameWidth * 0.42, 360),
          ry: Math.min(frameHeight * 0.33, 142),
          blink,
          time,
          motion: true,
          cacheSeed: `${seedBase}:eye-base`,
          textureSeed: `${seedBase}:frame:${i}`,
        });
        next.push({
          canvas: local,
          sourceWidth: local.width,
          sourceHeight: local.height,
          width: frameWidth,
          height: frameHeight,
          blink,
          kind: isBlink ? "blink" : "open",
          index: i,
        });
      }

      cacheFrames = next;
      const elapsed = performance.now() - started;
      buildLabel.textContent = elapsed.toFixed(1) + " ms";
      cacheLabel.textContent = `${cacheFrames.length} frames @${cacheDpr.toFixed(2)}x`;
    }

    function drawDetailedEye(target, opts) {
      const rx = opts.rx;
      const ry = opts.ry;
      const cell = clamp(Math.min(opts.width, opts.height) / 84, 7, 10);
      const fontSize = cell * 1.36;
      const blink = opts.blink;
      const lidScale = 1 - blink * 0.93;
      const gazeStrength = opts.gazeStrength ?? 0.012;
      const lookX = (hash01(opts.cacheSeed, "look") - 0.5) * rx * gazeStrength;
      const lookY = (hash01(opts.cacheSeed, "look-y") - 0.5) * ry * gazeStrength;
      const irisR = Math.min(rx, ry) * 0.56;
      const pupilR = irisR * 0.39;

      target.save();
      target.textAlign = "center";
      target.textBaseline = "middle";
      target.globalCompositeOperation = "source-over";

      for (let y = -ry; y <= ry; y += cell * 1.12) {
        for (let x = -rx; x <= rx; x += cell) {
          const nx = x / rx;
          const ax = Math.abs(nx);
          if (ax > 1) continue;

          const lines = getEyeMaskLines(nx, ax, ry, lidScale);
          const upperLine = lines.upper;
          const lowerLine = lines.lower;
          if (y < upperLine || y > lowerLine) continue;

          const parts = [opts.cacheSeed, Math.round(x), Math.round(y)];
          const textureParts = [opts.textureSeed || opts.cacheSeed, Math.round(x), Math.round(y)];
          const px = x - lookX;
          const py = y - lookY;
          const dist = Math.hypot(px, py);
          const edge = Math.min(y - upperLine, lowerLine - y);
          const eroded = edge < cell * 8 && hash01(...textureParts, "erode") > 0.89;
          if (eroded) continue;

          const noise = Math.sin(x * 0.11 + y * 0.17 + opts.time * 0.004) * 0.5 + 0.5;
          let char = pick(glyphs, ...parts, "body");
          let color = "rgba(118, 16, 16, 0.44)";
          let alpha = 0.36 + noise * 0.28;

          if (edge < cell * 3.2) {
            char = pick(edgeGlyphs, ...parts, "edge");
            color = `rgba(218, 0, 0, ${0.32 + noise * 0.38})`;
          }

          if (dist < irisR) {
            const ring = dist / irisR;
            char = pick(irisGlyphs, ...parts, "iris");
            alpha = 0.52 + noise * 0.38;
            const red = Math.floor(160 + 70 * (1 - ring));
            const green = Math.floor(8 + 20 * (1 - ring));
            color = `rgba(${red}, ${green}, ${Math.floor(18 + noise * 26)}, ${alpha})`;

            const spoke = Math.abs(Math.sin(Math.atan2(py, px) * 18 + opts.time * 0.0013));
            if (spoke > 0.86 && ring > 0.34) {
              char = pick(["/", "\\", "|"], ...parts, "spoke");
              color = `rgba(255, 34, 46, ${0.58 + noise * 0.3})`;
            }
          }

          if (dist < pupilR) {
            const inner = dist / pupilR;
            char = pick([" ", ".", "`"], ...parts, "pupil");
            color = `rgba(${Math.floor(12 + noise * 15)}, 0, 0, ${0.86 - inner * 0.25})`;
          }

          const h1 = Math.hypot(px + irisR * 0.32, py + irisR * 0.38);
          const h2 = Math.hypot(px - irisR * 0.18, py + irisR * 0.2);
          if (h1 < irisR * 0.13 || h2 < irisR * 0.07) {
            char = pick(["*", "+", "."], ...parts, "highlight");
            color = `rgba(255, 214, 222, ${0.8 + noise * 0.18})`;
          }

          const jx = opts.motion ? 0.18 * Math.sin(opts.time * 0.012 + x * 0.23 + y * 0.11) : 0;
          const jy = opts.motion ? 0.18 * Math.cos(opts.time * 0.011 + x * 0.08 - y * 0.19) : 0;
          target.font = `700 ${fontSize}px Consolas, "Courier New", monospace`;
          target.fillStyle = color;
          target.fillText(char, opts.cx + x + jx, opts.cy + y + jy);
        }
      }

      drawLids(target, opts.cx, opts.cy, rx, ry, lidScale, blink, opts.time, opts.cacheSeed);
      target.restore();
    }

    function getEyeMaskLines(nx, ax, ry, lidScale) {
      const almond = ry * Math.pow(1 - Math.pow(ax, 1.34), 0.62) * lidScale;
      const sleepyDrop = ry * (0.1 + 0.025 * Math.sin((nx - 0.2) * Math.PI));
      return {
        upper: -almond * (0.4 + 0.05 * Math.sin((nx + 0.15) * Math.PI)) + sleepyDrop,
        lower: almond * (0.72 + 0.04 * Math.cos((nx - 0.1) * Math.PI)) + sleepyDrop * 0.1,
      };
    }

    function drawLids(target, cx, cy, rx, ry, lidScale, blink, time, cacheSeed) {
      const close = blink * ry * 1.25;
      const upperY = cy - ry * 0.42 * lidScale + ry * 0.1 - close * 0.18;
      const lowerY = cy + ry * 0.72 * lidScale + ry * 0.02 + close * 0.12;

      const gradTop = target.createLinearGradient(cx, cy - ry * 1.35, cx, cy + ry * 0.08);
      gradTop.addColorStop(0, "rgba(0, 0, 0, 0.98)");
      gradTop.addColorStop(0.58, "rgba(0, 0, 0, 0.82)");
      gradTop.addColorStop(1, "rgba(0, 0, 0, 0.1)");
      target.fillStyle = gradTop;
      target.fillRect(0, 0, cx * 2, upperY + ry * 0.22);

      const gradBottom = target.createLinearGradient(cx, cy, cx, cy + ry * 1.8);
      gradBottom.addColorStop(0, "rgba(0, 0, 0, 0.02)");
      gradBottom.addColorStop(0.38, "rgba(0, 0, 0, 0.5)");
      gradBottom.addColorStop(1, "rgba(0, 0, 0, 0.98)");
      target.fillStyle = gradBottom;
      target.fillRect(0, lowerY - ry * 0.06, cx * 2, cy * 2);

      target.fillStyle = "rgba(0, 0, 0, 0.52)";
      target.beginPath();
      target.ellipse(cx, cy - ry * 0.42, rx * 1.14, ry * 0.34, 0, 0, Math.PI * 2);
      target.fill();
      target.beginPath();
      target.ellipse(cx, cy + ry * 0.76, rx * 1.06, ry * 0.24, 0, 0, Math.PI * 2);
      target.fill();

      drawLidGlyphBand(target, cx, cy, rx, ry, lidScale, blink, time, cacheSeed, -1);
      drawLidGlyphBand(target, cx, cy, rx, ry, lidScale, blink, time, cacheSeed, 1);
    }

    function drawLidGlyphBand(target, cx, cy, rx, ry, lidScale, blink, time, cacheSeed, side) {
      const sampleCount = 112;
      const band = side < 0 ? 9 : 4;
      const baseSize = clamp(Math.min(width, height) / 112, 5, 8);

      for (let i = 0; i <= sampleCount; i += 1) {
        const p = i / sampleCount;
        const nx = -1 + p * 2;
        const endFade = Math.pow(1 - Math.abs(nx), 0.28);
        const shape = Math.pow(1 - Math.abs(nx), side < 0 ? 0.58 : 0.64);
        if (endFade < 0.22 || hash01(cacheSeed, side, i, "skip") < 0.18 + blink * 0.18) continue;

        for (let layer = 0; layer < band; layer += 1) {
          const n1 = hash01(cacheSeed, side, i, layer, "n1");
          const n2 = hash01(cacheSeed, side, i, layer, "n2");
          const n3 = hash01(cacheSeed, side, i, layer, "n3");
          const inward = side < 0 ? layer * 2.7 : -layer * 2.2;
          const curveY = side < 0
            ? cy - ry * 0.42 * shape * lidScale + ry * 0.1
            : cy + ry * 0.72 * shape * lidScale + ry * 0.02;
          const torn = Math.sin(nx * 9.2 + layer * 1.7 + time * 0.0018) * (side < 0 ? 2.6 : 1.8);
          const y = curveY + inward + (n1 - 0.5) * 13 + torn;
          const x = cx + nx * rx + (n2 - 0.5) * 12;
          const alpha = (0.05 + (band - layer) / band * (side < 0 ? 0.19 : 0.12) + n3 * 0.1) * endFade;
          const red = Math.floor(108 + n1 * 104);
          const size = baseSize + n2 * 5 + (layer === 0 ? 1.5 : 0);

          target.font = `${layer < 2 ? 700 : 400} ${size}px Consolas, "Courier New", monospace`;
          target.fillStyle = `rgba(${red}, 0, ${Math.floor(n3 * 18)}, ${alpha * 1.2})`;
          target.fillText(pick(lidGlyphs, cacheSeed, side, i, layer, "glyph"), x, y);
        }
      }
    }

    function triggerBlink(now) {
      blinkStart = now;
      blinkDuration = 150 + hash01(seedBase, "blink-duration", Math.floor(now)) * 110;
      forcedBlink = false;
      nextBlink = now + 5000 + hash01(seedBase, "next", Math.floor(now / 1000)) * 7000;
    }

    function currentBlink(now) {
      if (!nextBlink) nextBlink = now + 5000 + hash01(seedBase, "initial-next") * 7000;
      if ((settings.motion && now >= nextBlink) || forcedBlink) triggerBlink(now);
      const p = clamp((now - blinkStart) / blinkDuration, 0, 1);
      if (p <= 0 || p >= 1) return 0;
      return Math.sin(p * Math.PI);
    }

    function selectCachedFrame(now, blink) {
      const openCount = 18;
      const blinkStartIndex = openCount;
      if (blink > 0.01) {
        const blinkCount = cacheFrames.length - openCount;
        const index = blinkStartIndex + Math.min(blinkCount - 1, Math.round(blink * (blinkCount - 1)));
        return cacheFrames[index] || cacheFrames[0];
      }
      const slow = settings.motion ? Math.floor(now / 900) : 0;
      return cacheFrames[slow % openCount] || cacheFrames[0];
    }

    function drawBackground(now) {
      const t = now / 1000;
      ctx.fillStyle = "#020000";
      ctx.fillRect(0, 0, width, height);

      const pulse = settings.motion ? Math.sin(t * 1.4) * 0.06 : 0;
      const glow = ctx.createRadialGradient(width * 0.5, height * 0.5, 0, width * 0.5, height * 0.5, Math.max(width, height) * 0.65);
      glow.addColorStop(0, `rgba(92, 0, 0, ${0.24 + pulse})`);
      glow.addColorStop(0.34, "rgba(28, 0, 0, 0.25)");
      glow.addColorStop(1, "rgba(0, 0, 0, 1)");
      ctx.fillStyle = glow;
      ctx.fillRect(0, 0, width, height);

      for (const cut of backgroundCuts) {
        const x = cut.x + (settings.motion ? Math.sin(t * 0.18 + cut.phase) * 24 : 0);
        ctx.fillStyle = `rgba(170, 0, 0, ${cut.alpha})`;
        ctx.fillRect(x, cut.y, cut.w, cut.h);
      }
    }

    function drawRain(now) {
      if (!settings.rain) return;
      const t = now / 1000;
      ctx.save();
      ctx.globalCompositeOperation = "lighter";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      for (const item of rainGlyphs) {
        const y = settings.motion ? (item.y + t * item.speed) % (height + 60) - 30 : item.y;
        const x = item.x + (settings.motion ? Math.sin(t * 1.8 + item.phase) * item.sway : 0);
        ctx.font = `700 ${item.size}px Consolas, "Courier New", monospace`;
        ctx.fillStyle = `rgba(225, 24, 42, ${item.alpha})`;
        ctx.fillText(item.glyph, x, y);
      }
      ctx.restore();
    }

    function drawCachedEye(now, blink) {
      const frame = selectCachedFrame(now, blink);
      if (!frame) return "--";
      const drawW = frame.width;
      const drawH = frame.height;
      const x = width * 0.5 - drawW * 0.5;
      const y = height * 0.5 - drawH * 0.5;
      ctx.drawImage(frame.canvas, 0, 0, frame.sourceWidth, frame.sourceHeight, x, y, drawW, drawH);
      activeLabel.textContent = `${frame.kind} ${frame.index}`;
      return "drawImage";
    }

    function drawLiveEye(now, blink) {
      drawDetailedEye(ctx, {
        width,
        height,
        cx: width * 0.5,
        cy: height * 0.51,
        rx: Math.min(width * 0.37, 360),
        ry: Math.min(height * 0.19, 142),
        blink,
        time: now,
        motion: settings.motion,
        cacheSeed: `${seedBase}:eye-base`,
        textureSeed: `${seedBase}:live:${Math.floor(now / 180)}`,
        gazeStrength: 0.012,
      });
      activeLabel.textContent = "live";
      return "fillText";
    }

    function frame(now) {
      const frameStart = performance.now();
      const blink = currentBlink(now);
      drawBackground(now);
      drawRain(now);

      const eyeStart = performance.now();
      const drawMode = settings.live ? drawLiveEye(now, blink) : drawCachedEye(now, blink);
      const eyeCost = performance.now() - eyeStart;
      drawLabel.textContent = `${eyeCost.toFixed(2)} ms ${drawMode}`;

      updatePerf(frameStart);
      requestAnimationFrame(frame);
    }

    function updatePerf(frameStart) {
      frames += 1;
      const now = performance.now();
      if (now - lastFpsTime >= 500) {
        const fps = frames * 1000 / (now - lastFpsTime);
        fpsLabel.textContent = fps.toFixed(0);
        frameLabel.textContent = (now - frameStart).toFixed(2) + " ms";
        lastFpsTime = now;
        frames = 0;
      }
      lastFrameTime = now;
    }

    function setButton(button, value) {
      button.classList.toggle("is-on", value);
    }

    liveButton.addEventListener("click", () => {
      settings.live = !settings.live;
      modeLabel.textContent = settings.live ? "live fillText" : "cached sprite";
      setButton(liveButton, settings.live);
    });

    motionButton.addEventListener("click", () => {
      settings.motion = !settings.motion;
      setButton(motionButton, settings.motion);
    });

    rainButton.addEventListener("click", () => {
      settings.rain = !settings.rain;
      setButton(rainButton, settings.rain);
    });

    blinkButton.addEventListener("click", () => {
      forcedBlink = true;
    });

    rebuildButton.addEventListener("click", rebuildCache);

    window.addEventListener("keydown", (event) => {
      const key = event.key.toLowerCase();
      if (key === "l") liveButton.click();
      if (key === "m") motionButton.click();
      if (key === "r") rainButton.click();
      if (key === "b") blinkButton.click();
    });

    window.addEventListener("resize", resize);
    resize();
    requestAnimationFrame(frame);
  </script>
</body>
</html>
