<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cached Text Eye Render Test</title>
  <style>
    :root {
      color-scheme: dark;
      --panel: rgba(9, 7, 8, 0.72);
      --line: rgba(255, 72, 86, 0.2);
      --text: #f4dddd;
      --muted: #9b7e82;
      --red: #e24b5a;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 44%, rgba(98, 0, 10, 0.26), transparent 34%),
        radial-gradient(circle at 50% 52%, #130001 0%, #050001 50%, #000 100%);
      color: var(--text);
      font-family: "Malgun Gothic", "Noto Sans KR", system-ui, sans-serif;
    }

    canvas {
      position: fixed;
      inset: 0;
      display: block;
      width: 100vw;
      height: 100vh;
    }

    .panel {
      position: fixed;
      left: 18px;
      bottom: 18px;
      z-index: 5;
      width: min(430px, calc(100vw - 36px));
      border: 1px solid var(--line);
      padding: 14px;
      background: var(--panel);
      box-shadow: 0 20px 52px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(10px);
    }

    .panel h1 {
      margin: 0 0 8px;
      color: #ffe0e0;
      font-size: 13px;
      letter-spacing: 0.09em;
      text-transform: uppercase;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px 12px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .grid strong {
      color: var(--text);
      font-weight: 650;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      padding-top: 12px;
    }

    button {
      border: 1px solid rgba(255, 82, 94, 0.34);
      padding: 6px 9px;
      color: var(--text);
      background: rgba(117, 14, 26, 0.24);
      font: inherit;
      font-size: 12px;
      cursor: pointer;
    }

    button.is-on {
      border-color: rgba(255, 120, 130, 0.72);
      color: #fff4f4;
      background: rgba(169, 24, 38, 0.56);
    }

    .note {
      margin-top: 10px;
      color: #876f72;
      font-size: 11px;
      line-height: 1.5;
    }

    @media (max-width: 560px) {
      .panel {
        right: 12px;
        bottom: 12px;
        left: 12px;
        width: auto;
      }
    }
  </style>
</head>
<body>
  <canvas id="scene" aria-label="cached text eye render test"></canvas>

  <section class="panel" aria-label="render test panel">
    <h1>Cached text eye render test</h1>
    <div class="grid">
      <span>mode <strong id="modeLabel">cached reference</strong></span>
      <span>cache <strong id="cacheLabel">--</strong></span>
      <span>build <strong id="buildLabel">-- ms</strong></span>
      <span>active <strong id="activeLabel">--</strong></span>
      <span>fps <strong id="fpsLabel">--</strong></span>
      <span>frame <strong id="frameLabel">-- ms</strong></span>
      <span>eye draw <strong id="drawLabel">-- ms</strong></span>
      <span>rain <strong id="rainLabel">--</strong></span>
    </div>
    <div class="controls">
      <button id="liveButton" type="button">live original</button>
      <button id="motionButton" class="is-on" type="button">motion</button>
      <button id="rainButton" class="is-on" type="button">text rain</button>
      <button id="blinkButton" type="button">blink now</button>
      <button id="rebuildButton" type="button">rebuild cache</button>
    </div>
    <div class="note">Cached mode pre-renders the original eye function into gaze buckets. Live mode calls the original-style eye renderer every frame.</div>
  </section>

  <script>
    "use strict";

    const canvas = document.getElementById("scene");
    const ctx = canvas.getContext("2d", { alpha: false });
    const modeLabel = document.getElementById("modeLabel");
    const cacheLabel = document.getElementById("cacheLabel");
    const buildLabel = document.getElementById("buildLabel");
    const activeLabel = document.getElementById("activeLabel");
    const fpsLabel = document.getElementById("fpsLabel");
    const frameLabel = document.getElementById("frameLabel");
    const drawLabel = document.getElementById("drawLabel");
    const rainLabel = document.getElementById("rainLabel");
    const liveButton = document.getElementById("liveButton");
    const motionButton = document.getElementById("motionButton");
    const rainButton = document.getElementById("rainButton");
    const blinkButton = document.getElementById("blinkButton");
    const rebuildButton = document.getElementById("rebuildButton");

    const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    const seedBase = "cached-eye-reference:seed-1:night:altered";
    const variantId = "sleepy1";
    const glyphs = [".", "-", "*", "+", "x", "X", ":", "'", "`"];
    const irisGlyphs = ["*", "+", "x", "X", "#", "%"];
    const edgeGlyphs = ["/", "\\", "|", "_", "-", "."];
    const lidGlyphs = ["-", "_", ".", "'", "`", "x", "+", ":"];
    const gazeBucketsX = [-1, -0.5, 0, 0.5, 1];
    const gazeBucketsY = [-1, 0, 1];

    const settings = {
      live: false,
      motion: !reduceMotion,
      rain: true,
    };

    let width = 0;
    let height = 0;
    let dpr = 1;
    let cacheDpr = 1;
    let mouseX = 0;
    let mouseY = 0;
    let cacheFrames = { open: new Map(), blink: [], openCount: 0, blinkCount: 0, gazeCount: 0, crop: null };
    let rainGlyphs = [];
    let backgroundCuts = [];
    let frames = 0;
    let lastFpsTime = performance.now();
    let blinkStart = -10000;
    let blinkDuration = 190;
    let nextBlink = 0;
    let forcedBlink = false;

    function hashString(input) {
      let h = 2166136261;
      for (let i = 0; i < input.length; i += 1) {
        h ^= input.charCodeAt(i);
        h = Math.imul(h, 16777619);
      }
      return h >>> 0;
    }

    function hash01(...parts) {
      const base = hashString(parts.join("|"));
      let h = base + 0x6d2b79f5;
      h = Math.imul(h ^ (h >>> 15), h | 1);
      h ^= h + Math.imul(h ^ (h >>> 7), h | 61);
      return ((h ^ (h >>> 14)) >>> 0) / 4294967296;
    }

    function pseudo(value) {
      const n = Math.sin(value * 127.1 + 311.7) * 43758.5453;
      return n - Math.floor(n);
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function pick(list, ...parts) {
      return list[Math.floor(hash01(...parts) * list.length) % list.length];
    }

    function pickRandom(list) {
      return list[Math.floor(Math.random() * list.length)];
    }

    function pickSeeded(list, seed) {
      return list[Math.floor(pseudo(seed) * list.length) % list.length];
    }

    function resize() {
      dpr = Math.min(window.devicePixelRatio || 1, 1.5);
      cacheDpr = Math.min(window.devicePixelRatio || 1, 1);
      width = Math.max(1, Math.floor(window.innerWidth));
      height = Math.max(1, Math.floor(window.innerHeight));
      canvas.width = Math.floor(width * dpr);
      canvas.height = Math.floor(height * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.imageSmoothingEnabled = false;
      generateScene();
      rebuildCache();
    }

    function generateScene() {
      const rainCount = Math.round(clamp(width * height / 2100, 240, 620));
      rainGlyphs = Array.from({ length: rainCount }, (_, index) => ({
        x: hash01(seedBase, "rain", index, "x") * width,
        y: hash01(seedBase, "rain", index, "y") * height,
        size: 7 + hash01(seedBase, "rain", index, "size") * 8,
        speed: 12 + hash01(seedBase, "rain", index, "speed") * 58,
        sway: (hash01(seedBase, "rain", index, "sway") - 0.5) * 24,
        phase: hash01(seedBase, "rain", index, "phase") * Math.PI * 2,
        glyph: pick(glyphs, seedBase, "rain", index, "glyph"),
        alpha: 0.08 + hash01(seedBase, "rain", index, "alpha") * 0.22,
      }));
      backgroundCuts = Array.from({ length: 52 }, (_, index) => ({
        x: hash01(seedBase, "cut", index, "x") * width,
        y: hash01(seedBase, "cut", index, "y") * height,
        h: 16 + hash01(seedBase, "cut", index, "h") * 90,
        w: 1 + hash01(seedBase, "cut", index, "w") * 2,
        alpha: 0.012 + hash01(seedBase, "cut", index, "a") * 0.032,
        phase: hash01(seedBase, "cut", index, "phase") * Math.PI * 2,
      }));
      rainLabel.textContent = String(rainGlyphs.length);
    }

    function eyeGeometry() {
      const cx = width * 0.5;
      const cy = height * 0.51;
      const rx = Math.min(width * 0.37, 360);
      const ry = Math.min(height * 0.19, 142);
      return { cx, cy, rx, ry };
    }

    function eyeCropRect() {
      const g = eyeGeometry();
      const x = clamp(Math.floor(g.cx - g.rx * 1.25), 0, width);
      const y = clamp(Math.floor(g.cy - g.ry * 1.85), 0, height);
      const right = clamp(Math.ceil(g.cx + g.rx * 1.25), 0, width);
      const bottom = clamp(Math.ceil(g.cy + g.ry * 1.95), 0, height);
      return {
        x,
        y,
        width: Math.max(1, right - x),
        height: Math.max(1, bottom - y),
      };
    }

    function rebuildCache() {
      const started = performance.now();
      const crop = eyeCropRect();
      const openCount = 6;
      const blinkCount = 8;
      const nextOpen = new Map();
      const nextBlink = [];

      const buildFrame = ({ index, kind, blink, gazeX, gazeY, time }) => {
        const local = document.createElement("canvas");
        local.width = Math.ceil(crop.width * cacheDpr);
        local.height = Math.ceil(crop.height * cacheDpr);
        const localCtx = local.getContext("2d", { alpha: true });
        localCtx.setTransform(cacheDpr, 0, 0, cacheDpr, -crop.x * cacheDpr, -crop.y * cacheDpr);
        localCtx.clearRect(crop.x, crop.y, crop.width, crop.height);
        localCtx.imageSmoothingEnabled = false;
        drawReferenceEye(localCtx, {
          time,
          blink,
          gazeX,
          gazeY,
          motion: true,
        });
        return {
          canvas: local,
          sourceWidth: local.width,
          sourceHeight: local.height,
          crop,
          blink,
          gazeX,
          gazeY,
          kind,
          index,
        };
      };

      for (const gx of gazeBucketsX) {
        for (const gy of gazeBucketsY) {
          const frames = [];
          for (let i = 0; i < openCount; i += 1) {
            frames.push(buildFrame({
              index: i,
              kind: "open",
              blink: 0,
              gazeX: gx,
              gazeY: gy,
              time: i * 113,
            }));
          }
          nextOpen.set(gazeKey(gx, gy), frames);
        }
      }

      for (let i = 0; i < blinkCount; i += 1) {
        const p = i / Math.max(1, blinkCount - 1);
        nextBlink.push(buildFrame({
          index: i,
          kind: "blink",
          blink: Math.sin(p * Math.PI),
          gazeX: 0,
          gazeY: 0,
          time: i * 113,
        }));
      }

      cacheFrames = {
        open: nextOpen,
        blink: nextBlink,
        openCount,
        blinkCount,
        gazeCount: gazeBucketsX.length * gazeBucketsY.length,
        crop,
      };
      const elapsed = performance.now() - started;
      buildLabel.textContent = elapsed.toFixed(1) + " ms";
      cacheLabel.textContent = `${cacheFrames.gazeCount * openCount + blinkCount} frames @${cacheDpr.toFixed(2)}x`;
    }

    function drawReferenceEye(target, opts) {
      const t = opts.time;
      const g = eyeGeometry();
      const cx = g.cx;
      const cy = g.cy;
      const rx = g.rx;
      const ry = g.ry;
      const cell = clamp(Math.min(width, height) / 84, 7, 10);
      const fontSize = cell * 1.36;
      const lookX = opts.gazeX * rx * 0.045 + (opts.motion ? Math.sin(t * 0.0011) * 7 : 0);
      const lookY = opts.gazeY * ry * 0.06 + (opts.motion ? Math.cos(t * 0.0014) * 4 : 0);
      const irisR = Math.min(rx, ry) * 0.56;
      const pupilR = irisR * 0.39;
      const blink = opts.blink;
      const lidScale = 1 - blink * 0.93;

      target.save();
      target.textAlign = "center";
      target.textBaseline = "middle";
      target.font = `${fontSize}px Consolas, "Courier New", monospace`;
      target.globalCompositeOperation = "source-over";

      const jitterAmp = opts.motion ? 0.45 : 0;
      for (let y = -ry; y <= ry; y += cell * 1.12) {
        for (let x = -rx; x <= rx; x += cell) {
          const nx = x / rx;
          const ax = Math.abs(nx);
          if (ax > 1) continue;

          const lines = getEyeMaskLines(nx, ax, ry, lidScale);
          const upperLine = lines.upper;
          const lowerLine = lines.lower;
          if (y < upperLine || y > lowerLine) continue;

          const px = x - lookX;
          const py = y - lookY;
          const dist = Math.sqrt(px * px + py * py);
          const edge = Math.min(y - upperLine, lowerLine - y);
          const scar = Math.sin(x * 0.073 + y * 0.031 + t * 0.003);
          const eroded = scar > 0.88 && edge < cell * 8;
          if (eroded) continue;

          const noise = Math.sin(x * 0.11 + y * 0.17 + t * 0.004) * 0.5 + 0.5;
          const seed = x * 3.13 + y * 5.71 + Math.floor(t / 260);
          let char = pickSeeded(glyphs, seed);
          let color = "rgba(118, 16, 16, 0.44)";
          let alpha = 0.36 + noise * 0.28;

          if (edge < cell * 3.2) {
            char = pickSeeded(edgeGlyphs, seed + 7.1);
            color = `rgba(202, 0, 0, ${0.27 + noise * 0.34})`;
          }

          if (dist < irisR) {
            const ring = dist / irisR;
            char = pickSeeded(irisGlyphs, seed + 13.2);
            alpha = 0.52 + noise * 0.38;
            const red = Math.floor(160 + 70 * (1 - ring));
            const green = Math.floor(8 + 20 * (1 - ring));
            color = `rgba(${red}, ${green}, ${Math.floor(18 + noise * 26)}, ${alpha})`;

            const spoke = Math.abs(Math.sin(Math.atan2(py, px) * 18 + t * 0.0013));
            if (spoke > 0.86 && ring > 0.34) {
              char = pickSeeded(["/", "\\", "|"], seed + 17.3);
              color = `rgba(255, 34, 46, ${0.58 + noise * 0.3})`;
            }
          }

          if (dist < pupilR) {
            const inner = dist / pupilR;
            char = pickSeeded([" ", ".", "`"], seed + 19.9);
            color = `rgba(${Math.floor(12 + noise * 15)}, 0, 0, ${0.86 - inner * 0.25})`;
          }

          const h1 = Math.hypot(px + irisR * 0.32, py + irisR * 0.38);
          const h2 = Math.hypot(px - irisR * 0.18, py + irisR * 0.2);
          if (h1 < irisR * 0.13 || h2 < irisR * 0.07) {
            char = pickSeeded(["*", "+", "."], seed + 23.1);
            color = `rgba(255, 214, 222, ${0.8 + noise * 0.18})`;
          }

          const jx = jitterAmp * Math.sin(t * 0.012 + x * 0.23 + y * 0.11);
          const jy = jitterAmp * Math.cos(t * 0.011 + x * 0.08 - y * 0.19);
          target.fillStyle = color;
          target.fillText(char, cx + x + jx, cy + y + jy);
        }
      }

      drawReferenceLids(target, cx, cy, rx, ry, lidScale, blink, t);
      target.restore();
    }

    function getEyeMaskLines(nx, ax, ry, lidScale) {
      if (variantId === "eye1") {
        const almond = ry * Math.pow(1 - Math.pow(ax, 1.52), 0.53) * lidScale;
        const upperBias = 1 + 0.1 * Math.sin((nx + 0.2) * Math.PI);
        const lowerBias = 0.85 + 0.11 * Math.cos((nx - 0.1) * Math.PI);
        return {
          upper: -almond * upperBias,
          lower: almond * lowerBias,
        };
      }

      const almond = ry * Math.pow(1 - Math.pow(ax, 1.34), 0.62) * lidScale;
      const sleepyDrop = ry * (0.1 + 0.025 * Math.sin((nx - 0.2) * Math.PI));
      return {
        upper: -almond * (0.4 + 0.05 * Math.sin((nx + 0.15) * Math.PI)) + sleepyDrop,
        lower: almond * (0.72 + 0.04 * Math.cos((nx - 0.1) * Math.PI)) + sleepyDrop * 0.1,
      };
    }

    function drawReferenceLids(target, cx, cy, rx, ry, lidScale, blink, t) {
      target.save();
      target.globalCompositeOperation = "source-over";
      const close = blink * ry * 1.25;
      const lid = getLidConfig(cy, ry, lidScale, close);
      const upperY = lid.upperY;
      const lowerY = lid.lowerY;

      const gradTop = target.createLinearGradient(cx, cy - ry * lid.topGradStart, cx, cy + ry * lid.topGradEnd);
      gradTop.addColorStop(0, "rgba(0, 0, 0, 0.98)");
      gradTop.addColorStop(0.58, `rgba(0, 0, 0, ${lid.topMidAlpha})`);
      gradTop.addColorStop(1, "rgba(0, 0, 0, 0.1)");
      target.fillStyle = gradTop;
      target.beginPath();
      target.rect(0, 0, width, upperY + ry * lid.topCoverPad);
      target.fill();

      const gradBottom = target.createLinearGradient(cx, cy, cx, cy + ry * 1.8);
      gradBottom.addColorStop(0, "rgba(0, 0, 0, 0.02)");
      gradBottom.addColorStop(0.38, `rgba(0, 0, 0, ${lid.bottomMidAlpha})`);
      gradBottom.addColorStop(1, "rgba(0, 0, 0, 0.98)");
      target.fillStyle = gradBottom;
      target.beginPath();
      target.rect(0, lowerY - ry * lid.bottomCoverPad, width, height);
      target.fill();

      target.globalCompositeOperation = "source-over";
      target.fillStyle = `rgba(0, 0, 0, ${lid.shadowAlpha})`;
      target.beginPath();
      target.ellipse(cx, cy - ry * lid.topShadowY, rx * 1.14, ry * lid.topShadowH, 0, 0, Math.PI * 2);
      target.fill();
      target.beginPath();
      target.ellipse(cx, cy + ry * lid.bottomShadowY, rx * 1.06, ry * lid.bottomShadowH, 0, 0, Math.PI * 2);
      target.fill();

      target.globalCompositeOperation = "source-over";
      target.textAlign = "center";
      target.textBaseline = "middle";
      drawReferenceLidGlyphBand(target, cx, cy, rx, ry, lidScale, blink, t, -1);
      drawReferenceLidGlyphBand(target, cx, cy, rx, ry, lidScale, blink, t, 1);
      target.restore();
    }

    function getLidConfig(cy, ry, lidScale, close) {
      if (variantId === "eye1") {
        return {
          upperY: cy - ry * lidScale - close * 0.18,
          lowerY: cy + ry * lidScale + close * 0.12,
          topGradStart: 1.7,
          topGradEnd: 0,
          topMidAlpha: 0.74,
          bottomMidAlpha: 0.62,
          topCoverPad: 0.18,
          bottomCoverPad: 0.16,
          shadowAlpha: 0.38,
          topShadowY: 0.98,
          topShadowH: 0.44,
          bottomShadowY: 0.88,
          bottomShadowH: 0.36,
        };
      }

      return {
        upperY: cy - ry * 0.42 * lidScale + ry * 0.1 - close * 0.18,
        lowerY: cy + ry * 0.72 * lidScale + ry * 0.02 + close * 0.12,
        topGradStart: 1.35,
        topGradEnd: 0.08,
        topMidAlpha: 0.82,
        bottomMidAlpha: 0.5,
        topCoverPad: 0.22,
        bottomCoverPad: 0.06,
        shadowAlpha: 0.52,
        topShadowY: 0.42,
        topShadowH: 0.34,
        bottomShadowY: 0.76,
        bottomShadowH: 0.24,
      };
    }

    function drawReferenceLidGlyphBand(target, cx, cy, rx, ry, lidScale, blink, t, side) {
      const time = t * 0.001;
      const sampleCount = 112;
      const band = variantId === "eye1" ? (side < 0 ? 7 : 5) : (side < 0 ? 9 : 4);
      const baseSize = clamp(Math.min(width, height) / 112, 5, 8);

      for (let i = 0; i <= sampleCount; i += 1) {
        const p = i / sampleCount;
        const nx = -1 + p * 2;
        const endFade = Math.pow(1 - Math.abs(nx), 0.28);
        const shape = Math.pow(
          1 - Math.abs(nx),
          variantId === "eye1" ? (side < 0 ? 0.52 : 0.55) : (side < 0 ? 0.58 : 0.64)
        );
        const x = cx + nx * rx;
        const curveY = getLidBandY(cy, ry, shape, lidScale, side);
        const skip = pseudo(i * 8.31 + side * 19.7) < 0.18 + blink * 0.18;
        if (skip || endFade < 0.22) continue;

        for (let layer = 0; layer < band; layer += 1) {
          const seed = i * 17.13 + layer * 23.9 + side * 41.7;
          const n1 = pseudo(seed + Math.floor(time * 9));
          const n2 = pseudo(seed + 5.2);
          const n3 = pseudo(seed + 9.9);
          const inward = variantId === "eye1"
            ? (side < 0 ? layer * 3.5 : -layer * 3.3)
            : (side < 0 ? layer * 2.7 : -layer * 2.2);
          const torn = Math.sin(nx * 9.2 + layer * 1.7 + time * 1.8) *
            (variantId === "eye1" ? 3.2 : (side < 0 ? 2.6 : 1.8));
          const y = curveY + inward + (n1 - 0.5) * 13 + torn;
          const xJitter = (n2 - 0.5) * 12 + Math.sin(time * 2.4 + seed) * 1.8;
          const alpha = variantId === "eye1"
            ? (0.06 + (band - layer) / band * 0.21 + n3 * 0.15) * endFade
            : (0.05 + (band - layer) / band * (side < 0 ? 0.19 : 0.12) + n3 * 0.1) * endFade;
          const red = Math.floor((variantId === "eye1" ? 126 : 98) + n1 * (variantId === "eye1" ? 114 : 86));
          const size = baseSize + n2 * 5 + (layer === 0 ? 1.5 : 0);

          target.font = `${layer < 2 ? 700 : 400} ${size}px Consolas, "Courier New", monospace`;
          target.fillStyle = `rgba(${red}, 0, ${Math.floor(n3 * 18)}, ${alpha})`;
          target.fillText(pickRandom(lidGlyphs), x + xJitter, y);
        }
      }
    }

    function getLidBandY(cy, ry, shape, lidScale, side) {
      if (variantId === "eye1") {
        return side < 0
          ? cy - ry * shape * lidScale
          : cy + ry * 0.88 * shape * lidScale;
      }

      return side < 0
        ? cy - ry * 0.42 * shape * lidScale + ry * 0.1
        : cy + ry * 0.72 * shape * lidScale + ry * 0.02;
    }

    function triggerBlink(now) {
      blinkStart = now;
      blinkDuration = 150 + hash01(seedBase, "blink-duration", Math.floor(now)) * 110;
      forcedBlink = false;
      nextBlink = now + 5000 + hash01(seedBase, "next", Math.floor(now / 1000)) * 7000;
    }

    function currentBlink(now) {
      if (!nextBlink) nextBlink = now + 5000 + hash01(seedBase, "initial-next") * 7000;
      if ((settings.motion && now >= nextBlink) || forcedBlink) triggerBlink(now);
      const p = clamp((now - blinkStart) / blinkDuration, 0, 1);
      if (p <= 0 || p >= 1) return 0;
      return Math.sin(p * Math.PI);
    }

    function gazeKey(x, y) {
      return `${x}:${y}`;
    }

    function nearestBucket(value, buckets) {
      let best = buckets[0];
      let bestDistance = Math.abs(value - best);
      for (const candidate of buckets) {
        const distance = Math.abs(value - candidate);
        if (distance < bestDistance) {
          best = candidate;
          bestDistance = distance;
        }
      }
      return best;
    }

    function nearestGaze() {
      return {
        x: nearestBucket(mouseX, gazeBucketsX),
        y: nearestBucket(mouseY, gazeBucketsY),
      };
    }

    function selectCachedFrame(now, blink) {
      if (blink > 0.01) {
        const blinkCount = cacheFrames.blink.length;
        const index = Math.min(blinkCount - 1, Math.round(blink * (blinkCount - 1)));
        return cacheFrames.blink[index] || cacheFrames.blink[0];
      }
      const gaze = nearestGaze();
      const frames = cacheFrames.open.get(gazeKey(gaze.x, gaze.y)) || cacheFrames.open.get(gazeKey(0, 0));
      if (!frames || !frames.length) return null;
      const slow = settings.motion ? Math.floor(now / 360) : 0;
      return frames[slow % frames.length];
    }

    function drawBackground(now) {
      const t = now / 1000;
      ctx.fillStyle = "#020000";
      ctx.fillRect(0, 0, width, height);

      const pulse = settings.motion ? Math.sin(t * 1.4) * 0.06 : 0;
      const glow = ctx.createRadialGradient(width * 0.5, height * 0.5, 0, width * 0.5, height * 0.5, Math.max(width, height) * 0.65);
      glow.addColorStop(0, `rgba(92, 0, 0, ${0.24 + pulse})`);
      glow.addColorStop(0.34, "rgba(28, 0, 0, 0.25)");
      glow.addColorStop(1, "rgba(0, 0, 0, 1)");
      ctx.fillStyle = glow;
      ctx.fillRect(0, 0, width, height);

      for (const cut of backgroundCuts) {
        const x = cut.x + (settings.motion ? Math.sin(t * 0.18 + cut.phase) * 24 : 0);
        ctx.fillStyle = `rgba(170, 0, 0, ${cut.alpha})`;
        ctx.fillRect(x, cut.y, cut.w, cut.h);
      }
    }

    function drawRain(now) {
      if (!settings.rain) return;
      const t = now / 1000;
      ctx.save();
      ctx.globalCompositeOperation = "lighter";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      for (const item of rainGlyphs) {
        const y = settings.motion ? (item.y + t * item.speed) % (height + 60) - 30 : item.y;
        const x = item.x + (settings.motion ? Math.sin(t * 1.8 + item.phase) * item.sway : 0);
        ctx.font = `700 ${item.size}px Consolas, "Courier New", monospace`;
        ctx.fillStyle = `rgba(225, 24, 42, ${item.alpha})`;
        ctx.fillText(item.glyph, x, y);
      }
      ctx.restore();
    }

    function drawCachedEye(now, blink) {
      const frame = selectCachedFrame(now, blink);
      if (!frame) return "--";
      const crop = frame.crop;
      ctx.drawImage(frame.canvas, 0, 0, frame.sourceWidth, frame.sourceHeight, crop.x, crop.y, crop.width, crop.height);
      activeLabel.textContent = `${frame.kind} ${frame.index} gaze ${frame.gazeX},${frame.gazeY}`;
      return "reference drawImage";
    }

    function drawLiveEye(now, blink) {
      drawReferenceEye(ctx, {
        time: now,
        blink,
        gazeX: mouseX,
        gazeY: mouseY,
        motion: settings.motion,
      });
      activeLabel.textContent = "live original";
      return "original fillText";
    }

    function frame(now) {
      const frameStart = performance.now();
      const blink = currentBlink(now);
      drawBackground(now);
      drawRain(now);

      const eyeStart = performance.now();
      const drawMode = settings.live ? drawLiveEye(now, blink) : drawCachedEye(now, blink);
      const eyeCost = performance.now() - eyeStart;
      drawLabel.textContent = `${eyeCost.toFixed(2)} ms ${drawMode}`;

      updatePerf(frameStart);
      requestAnimationFrame(frame);
    }

    function updatePerf(frameStart) {
      frames += 1;
      const now = performance.now();
      if (now - lastFpsTime >= 500) {
        const fps = frames * 1000 / (now - lastFpsTime);
        fpsLabel.textContent = fps.toFixed(0);
        frameLabel.textContent = (now - frameStart).toFixed(2) + " ms";
        lastFpsTime = now;
        frames = 0;
      }
    }

    function setButton(button, value) {
      button.classList.toggle("is-on", value);
    }

    liveButton.addEventListener("click", () => {
      settings.live = !settings.live;
      modeLabel.textContent = settings.live ? "live original" : "cached reference";
      setButton(liveButton, settings.live);
    });

    motionButton.addEventListener("click", () => {
      settings.motion = !settings.motion;
      setButton(motionButton, settings.motion);
    });

    rainButton.addEventListener("click", () => {
      settings.rain = !settings.rain;
      setButton(rainButton, settings.rain);
    });

    blinkButton.addEventListener("click", () => {
      forcedBlink = true;
    });

    rebuildButton.addEventListener("click", rebuildCache);

    window.addEventListener("keydown", (event) => {
      const key = event.key.toLowerCase();
      if (key === "l") liveButton.click();
      if (key === "m") motionButton.click();
      if (key === "r") rainButton.click();
      if (key === "b") blinkButton.click();
    });

    window.addEventListener("pointermove", (event) => {
      mouseX = clamp((event.clientX / width - 0.5) * 2, -1, 1);
      mouseY = clamp((event.clientY / height - 0.5) * 2, -1, 1);
    });

    window.addEventListener("pointerleave", () => {
      mouseX = 0;
      mouseY = 0;
    });

    window.addEventListener("resize", resize);
    resize();
    requestAnimationFrame(frame);
  </script>
</body>
</html>
