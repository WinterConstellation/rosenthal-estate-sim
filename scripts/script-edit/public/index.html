<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Script Edit Index</title>
    <link rel="stylesheet" href="/styles.css?v=item-actions" />
  </head>
  <body>
    <main id="script-edit-root" class="editor-shell">
      <aside class="item-pane">
        <div class="pane-head">
          <strong>Script Edit Index</strong>
          <span id="entry-count">0 / 0</span>
          <button id="reindex-button" type="button">Re-index</button>
        </div>
        <input id="search-input" type="search" aria-label="Search by id, label, or file" />
        <div class="pane-tools">
          <select id="kind-filter" aria-label="Filter by kind"></select>
          <select id="file-filter" aria-label="Filter by file"></select>
        </div>
        <div class="entry-list-shell">
          <div id="entry-list" class="entry-list"></div>
          <div id="entry-scrollbar" class="entry-scrollbar" aria-hidden="true">
            <div id="entry-scrollbar-thumb" class="entry-scrollbar-thumb"></div>
          </div>
        </div>
      </aside>
      <section class="edit-pane">
        <header class="edit-head">
          <div>
            <p id="selected-kind" class="eyebrow">No item</p>
            <h1 id="selected-label">Select an editable item</h1>
            <p id="selected-file"></p>
          </div>
          <button id="verify-button" type="button">Verify</button>
        </header>
        <textarea id="value-editor" spellcheck="false" disabled></textarea>
        <div class="actions">
          <button id="discard-button" type="button" disabled>Discard</button>
          <button id="save-button" type="button" disabled>Save</button>
        </div>
        <section id="item-action-pane" class="item-action-pane" hidden>
          <strong>항목 정리</strong>
          <div class="item-actions">
            <button id="move-up-button" type="button">위로</button>
            <button id="move-down-button" type="button">아래로</button>
            <button id="delete-item-button" class="danger-button" type="button">삭제</button>
          </div>
        </section>
        <section id="insert-pane" class="insert-pane" hidden>
          <strong>대사 추가</strong>
          <label id="insert-speaker-field">
            Speaker
            <input id="insert-speaker" type="text" />
          </label>
          <label>
            Text
            <textarea id="insert-text" spellcheck="false"></textarea>
          </label>
          <div class="insert-actions">
            <button id="insert-before-button" type="button">앞에 추가</button>
            <button id="insert-after-button" type="button">뒤에 추가</button>
          </div>
        </section>
      </section>
      <aside class="context-pane">
        <strong>Context</strong>
        <pre id="context-output"></pre>
      </aside>
    </main>
    <script type="module" src="/app.js?v=item-actions"></script>
  </body>
</html>
