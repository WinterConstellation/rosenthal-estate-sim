<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Marenol Mood Text Eye Demo</title>
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #020000;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      background:
        radial-gradient(circle at 50% 48%, rgba(75, 0, 0, 0.28), transparent 34%),
        radial-gradient(circle at 50% 52%, #120000 0%, #050000 42%, #000 100%);
      cursor: none;
    }
  </style>
</head>
<body>
  <canvas id="eyeCanvas" aria-label="Text eye horror demo"></canvas>

  <script>
    (() => {
      const canvas = document.getElementById("eyeCanvas");
      const ctx = canvas.getContext("2d", { alpha: false });
      const queryParams = new URLSearchParams(window.location.search);
      const staticPreview = queryParams.has("still");
      const reduceMotion = staticPreview || window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      const variantParam = queryParams.get("variant") || queryParams.get("eye");
      const variantId = variantParam === "eye1" || variantParam === "눈1" ? "eye1" : "sleepy1";
      const variantName = variantId === "eye1" ? "눈1" : "졸린눈1";
      document.title = `Marenol Mood Text Eye Demo - ${variantName}`;

      const glyphs = [".", "-", "*", "+", "x", ":", "'", "`"];
      const irisGlyphs = ["*", "+", "x", "X", "#", "%"];
      const edgeGlyphs = ["/", "\\", "|", "_", "-", "."];
      const lidGlyphs = ["-", "_", ".", "'", "`", "x", "+", ":"];

      let width = 0;
      let height = 0;
      let dpr = 1;
      let mouseX = 0;
      let mouseY = 0;
      let blinkUntil = 0;
      let blinkStartedAt = 0;
      let blinkDuration = 0;
      let nextBlink = 0;

      function rand(min, max) {
        return min + Math.random() * (max - min);
      }

      function pick(list) {
        return list[Math.floor(Math.random() * list.length)];
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function pseudo(value) {
        const n = Math.sin(value * 127.1 + 311.7) * 43758.5453;
        return n - Math.floor(n);
      }

      function resize() {
        dpr = Math.min(window.devicePixelRatio || 1, 1.75);
        width = Math.floor(window.innerWidth);
        height = Math.floor(window.innerHeight);
        canvas.width = Math.floor(width * dpr);
        canvas.height = Math.floor(height * dpr);
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }

      function drawBackground(t) {
        ctx.fillStyle = "#020000";
        ctx.fillRect(0, 0, width, height);

        const pulse = reduceMotion ? 0 : Math.sin(t * 0.0017) * 0.08;
        const glow = ctx.createRadialGradient(
          width * 0.5,
          height * 0.5,
          0,
          width * 0.5,
          height * 0.5,
          Math.max(width, height) * 0.62
        );
        glow.addColorStop(0, `rgba(92, 0, 0, ${0.22 + pulse})`);
        glow.addColorStop(0.34, "rgba(26, 0, 0, 0.24)");
        glow.addColorStop(1, "rgba(0, 0, 0, 1)");
        ctx.fillStyle = glow;
        ctx.fillRect(0, 0, width, height);

        ctx.save();
        ctx.globalCompositeOperation = "screen";
        for (let i = 0; i < 58; i += 1) {
          const x = (i * 97 + Math.sin(t * 0.0002 + i) * 38) % width;
          const y = (i * 41 + Math.cos(t * 0.00019 + i) * 28) % height;
          ctx.fillStyle = `rgba(170, 0, 0, ${0.015 + (i % 5) * 0.004})`;
          ctx.fillRect(x, y, rand(1, 3), rand(12, 88));
        }
        ctx.restore();
      }

      function drawEye(t) {
        const cx = width * 0.5;
        const cy = height * 0.51;
        const rx = Math.min(width * 0.37, 360);
        const ry = Math.min(height * 0.19, 142);
        const cell = clamp(Math.min(width, height) / 98, 5, 7);
        const fontSize = cell * 1.24;
        const lookX = mouseX * rx * 0.045 + (reduceMotion ? 0 : Math.sin(t * 0.0011) * 7);
        const lookY = mouseY * ry * 0.06 + (reduceMotion ? 0 : Math.cos(t * 0.0014) * 4);
        const irisR = Math.min(rx, ry) * 0.56;
        const pupilR = irisR * 0.39;
        const blink = getBlink(t);
        const lidScale = 1 - blink * 0.93;

        ctx.save();
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.font = `${fontSize}px Consolas, "Courier New", monospace`;
        ctx.globalCompositeOperation = "screen";

        const jitterAmp = reduceMotion ? 0 : 1.15;
        for (let y = -ry; y <= ry; y += cell * 1.12) {
          for (let x = -rx; x <= rx; x += cell) {
            const nx = x / rx;
            const ax = Math.abs(nx);
            if (ax > 1) continue;

            const lines = getEyeMaskLines(nx, ax, ry, lidScale);
            const upperLine = lines.upper;
            const lowerLine = lines.lower;
            if (y < upperLine || y > lowerLine) continue;

            const px = x - lookX;
            const py = y - lookY;
            const dist = Math.sqrt(px * px + py * py);
            const edge = Math.min(y - upperLine, lowerLine - y);
            const scar = Math.sin(x * 0.073 + y * 0.031 + t * 0.003);
            const eroded = scar > 0.88 && edge < cell * 8;
            if (eroded) continue;

            const noise = Math.sin(x * 0.11 + y * 0.17 + t * 0.004) * 0.5 + 0.5;
            let char = pick(glyphs);
            let color = "rgba(118, 16, 16, 0.44)";
            let alpha = 0.36 + noise * 0.28;

            if (edge < cell * 3.2) {
              char = pick(edgeGlyphs);
              color = `rgba(202, 0, 0, ${0.27 + noise * 0.34})`;
            }

            if (dist < irisR) {
              const ring = dist / irisR;
              char = pick(irisGlyphs);
              alpha = 0.52 + noise * 0.38;
              const red = Math.floor(160 + 70 * (1 - ring));
              const green = Math.floor(8 + 20 * (1 - ring));
              color = `rgba(${red}, ${green}, ${Math.floor(18 + noise * 26)}, ${alpha})`;

              const spoke = Math.abs(Math.sin(Math.atan2(py, px) * 18 + t * 0.0013));
              if (spoke > 0.86 && ring > 0.34) {
                char = pick(["/", "\\", "|"]);
                color = `rgba(255, 34, 46, ${0.58 + noise * 0.3})`;
              }
            }

            if (dist < pupilR) {
              const inner = dist / pupilR;
              char = pick([" ", ".", "`"]);
              color = `rgba(${Math.floor(12 + noise * 15)}, 0, 0, ${0.86 - inner * 0.25})`;
            }

            const h1 = Math.hypot(px + irisR * 0.32, py + irisR * 0.38);
            const h2 = Math.hypot(px - irisR * 0.18, py + irisR * 0.2);
            if (h1 < irisR * 0.13 || h2 < irisR * 0.07) {
              char = pick(["*", "+", "."]);
              color = `rgba(255, 214, 222, ${0.8 + noise * 0.18})`;
            }

            const jx = jitterAmp * Math.sin(t * 0.012 + x * 0.23 + y * 0.11);
            const jy = jitterAmp * Math.cos(t * 0.011 + x * 0.08 - y * 0.19);
            ctx.fillStyle = color;
            ctx.fillText(char, cx + x + jx, cy + y + jy);
          }
        }

        drawLids(cx, cy, rx, ry, lidScale, blink, t);
        ctx.restore();
      }

      function getEyeMaskLines(nx, ax, ry, lidScale) {
        if (variantId === "eye1") {
          const almond = ry * Math.pow(1 - Math.pow(ax, 1.52), 0.53) * lidScale;
          const upperBias = 1 + 0.1 * Math.sin((nx + 0.2) * Math.PI);
          const lowerBias = 0.85 + 0.11 * Math.cos((nx - 0.1) * Math.PI);
          return {
            upper: -almond * upperBias,
            lower: almond * lowerBias
          };
        }

        const almond = ry * Math.pow(1 - Math.pow(ax, 1.34), 0.62) * lidScale;
        const sleepyDrop = ry * (0.1 + 0.025 * Math.sin((nx - 0.2) * Math.PI));
        return {
          upper: -almond * (0.4 + 0.05 * Math.sin((nx + 0.15) * Math.PI)) + sleepyDrop,
          lower: almond * (0.72 + 0.04 * Math.cos((nx - 0.1) * Math.PI)) + sleepyDrop * 0.1
        };
      }

      function drawLids(cx, cy, rx, ry, lidScale, blink, t) {
        ctx.save();
        ctx.globalCompositeOperation = "source-over";
        const close = blink * ry * 1.25;
        const lid = getLidConfig(cy, ry, lidScale, close);
        const upperY = lid.upperY;
        const lowerY = lid.lowerY;

        const gradTop = ctx.createLinearGradient(cx, cy - ry * lid.topGradStart, cx, cy + ry * lid.topGradEnd);
        gradTop.addColorStop(0, "rgba(0, 0, 0, 0.98)");
        gradTop.addColorStop(0.58, `rgba(0, 0, 0, ${lid.topMidAlpha})`);
        gradTop.addColorStop(1, "rgba(0, 0, 0, 0.1)");
        ctx.fillStyle = gradTop;
        ctx.beginPath();
        ctx.rect(0, 0, width, upperY + ry * lid.topCoverPad);
        ctx.fill();

        const gradBottom = ctx.createLinearGradient(cx, cy, cx, cy + ry * 1.8);
        gradBottom.addColorStop(0, "rgba(0, 0, 0, 0.02)");
        gradBottom.addColorStop(0.38, `rgba(0, 0, 0, ${lid.bottomMidAlpha})`);
        gradBottom.addColorStop(1, "rgba(0, 0, 0, 0.98)");
        ctx.fillStyle = gradBottom;
        ctx.beginPath();
        ctx.rect(0, lowerY - ry * lid.bottomCoverPad, width, height);
        ctx.fill();

        ctx.globalCompositeOperation = "multiply";
        ctx.fillStyle = `rgba(0, 0, 0, ${lid.shadowAlpha})`;
        ctx.beginPath();
        ctx.ellipse(cx, cy - ry * lid.topShadowY, rx * 1.14, ry * lid.topShadowH, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(cx, cy + ry * lid.bottomShadowY, rx * 1.06, ry * lid.bottomShadowH, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.globalCompositeOperation = "screen";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        drawLidGlyphBand(cx, cy, rx, ry, lidScale, blink, t, -1);
        drawLidGlyphBand(cx, cy, rx, ry, lidScale, blink, t, 1);
        ctx.restore();
      }

      function getLidConfig(cy, ry, lidScale, close) {
        if (variantId === "eye1") {
          return {
            upperY: cy - ry * lidScale - close * 0.18,
            lowerY: cy + ry * lidScale + close * 0.12,
            topGradStart: 1.7,
            topGradEnd: 0,
            topMidAlpha: 0.74,
            bottomMidAlpha: 0.62,
            topCoverPad: 0.18,
            bottomCoverPad: 0.16,
            shadowAlpha: 0.38,
            topShadowY: 0.98,
            topShadowH: 0.44,
            bottomShadowY: 0.88,
            bottomShadowH: 0.36
          };
        }

        return {
          upperY: cy - ry * 0.42 * lidScale + ry * 0.1 - close * 0.18,
          lowerY: cy + ry * 0.72 * lidScale + ry * 0.02 + close * 0.12,
          topGradStart: 1.35,
          topGradEnd: 0.08,
          topMidAlpha: 0.82,
          bottomMidAlpha: 0.5,
          topCoverPad: 0.22,
          bottomCoverPad: 0.06,
          shadowAlpha: 0.52,
          topShadowY: 0.42,
          topShadowH: 0.34,
          bottomShadowY: 0.76,
          bottomShadowH: 0.24
        };
      }

      function drawLidGlyphBand(cx, cy, rx, ry, lidScale, blink, t, side) {
        const time = reduceMotion ? 0 : t * 0.001;
        const sampleCount = 112;
        const band = variantId === "eye1" ? (side < 0 ? 7 : 5) : (side < 0 ? 9 : 4);
        const baseSize = clamp(Math.min(width, height) / 112, 5, 8);

        for (let i = 0; i <= sampleCount; i += 1) {
          const p = i / sampleCount;
          const nx = -1 + p * 2;
          const endFade = Math.pow(1 - Math.abs(nx), 0.28);
          const shape = Math.pow(
            1 - Math.abs(nx),
            variantId === "eye1" ? (side < 0 ? 0.52 : 0.55) : (side < 0 ? 0.58 : 0.64)
          );
          const x = cx + nx * rx;
          const curveY = getLidBandY(cy, ry, shape, lidScale, side);
          const skip = pseudo(i * 8.31 + side * 19.7) < 0.18 + blink * 0.18;
          if (skip || endFade < 0.22) continue;

          for (let layer = 0; layer < band; layer += 1) {
            const seed = i * 17.13 + layer * 23.9 + side * 41.7;
            const n1 = pseudo(seed + Math.floor(time * 9));
            const n2 = pseudo(seed + 5.2);
            const n3 = pseudo(seed + 9.9);
            const inward = variantId === "eye1"
              ? (side < 0 ? layer * 3.5 : -layer * 3.3)
              : (side < 0 ? layer * 2.7 : -layer * 2.2);
            const torn = Math.sin(nx * 9.2 + layer * 1.7 + time * 1.8) *
              (variantId === "eye1" ? 3.2 : (side < 0 ? 2.6 : 1.8));
            const y = curveY + inward + (n1 - 0.5) * 13 + torn;
            const xJitter = (n2 - 0.5) * 12 + Math.sin(time * 2.4 + seed) * 1.8;
            const alpha = variantId === "eye1"
              ? (0.06 + (band - layer) / band * 0.21 + n3 * 0.15) * endFade
              : (0.05 + (band - layer) / band * (side < 0 ? 0.19 : 0.12) + n3 * 0.1) * endFade;
            const red = Math.floor((variantId === "eye1" ? 126 : 98) + n1 * (variantId === "eye1" ? 114 : 86));
            const size = baseSize + n2 * 5 + (layer === 0 ? 1.5 : 0);

            ctx.font = `${layer < 2 ? 700 : 400} ${size}px Consolas, "Courier New", monospace`;
            ctx.fillStyle = `rgba(${red}, 0, ${Math.floor(n3 * 18)}, ${alpha})`;
            ctx.fillText(pick(lidGlyphs), x + xJitter, y);
          }
        }
      }

      function getLidBandY(cy, ry, shape, lidScale, side) {
        if (variantId === "eye1") {
          return side < 0
            ? cy - ry * shape * lidScale
            : cy + ry * 0.88 * shape * lidScale;
        }

        return side < 0
          ? cy - ry * 0.42 * shape * lidScale + ry * 0.1
          : cy + ry * 0.72 * shape * lidScale + ry * 0.02;
      }

      function getBlink(t) {
        if (reduceMotion) return 0;
        if (!nextBlink) {
          nextBlink = t + rand(5000, 12000);
        }
        if (t >= nextBlink) {
          blinkStartedAt = t;
          blinkDuration = rand(135, 235);
          blinkUntil = t + blinkDuration;
          nextBlink = blinkUntil + rand(5000, 12000);
        }
        if (t > blinkUntil) return 0;
        const phase = (t - blinkStartedAt) / Math.max(1, blinkDuration);
        return Math.sin(clamp(phase, 0, 1) * Math.PI);
      }

      let last = performance.now();
      function frame(now) {
        last = now;

        drawBackground(now);
        drawEye(now);

        requestAnimationFrame(frame);
      }

      window.addEventListener("resize", resize);
      window.addEventListener("pointermove", (event) => {
        mouseX = clamp((event.clientX / width - 0.5) * 2, -1, 1);
        mouseY = clamp((event.clientY / height - 0.5) * 2, -1, 1);
      });

      resize();
      requestAnimationFrame(frame);
    })();
  </script>
</body>
</html>
